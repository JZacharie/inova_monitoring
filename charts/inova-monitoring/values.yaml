# Default values for inova-monitoring.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/jzacharie/inova-monitoring
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

route:
  enabled: true
  host: inova-monitoring.apps.your-cluster.com
  termination: edge

# Application Configuration
config:
  postgres:
    host: "pg-prd-cluster"
    port: 5432
    db: "inova_monitoring"
    user: "inova_user"
  prometheus:
    url: "http://prometheus-k8s.openshift-monitoring.svc:9090"
    endpoints: "[]"
  auth:
    methodsAllowed: "google,github,entra,basic"
    enableBasicAuth: true
  app:
    debug: false

# Sensitive Information (should be injected via Vault or SealedSecrets in real usage)
secrets:
  postgresPassword: "password"
  apiSecretKey: "generate-a-secure-key-here"
  googleClientId: ""
  googleClientSecret: ""
  githubClientId: ""
  githubClientSecret: ""
  entraIdClientId: ""
  entraIdClientSecret: ""
  entraIdTenantId: ""

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
