apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inova-monitoring.fullname" . }}
  labels:
    {{- include "inova-monitoring.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  API_SECRET_KEY: {{ .Values.secrets.apiSecretKey | quote }}
  SECRET_KEY: {{ .Values.secrets.apiSecretKey | quote }}  # Using the same for session key
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  ENTRA_ID_CLIENT_ID: {{ .Values.secrets.entraIdClientId | quote }}
  ENTRA_ID_CLIENT_SECRET: {{ .Values.secrets.entraIdClientSecret | quote }}
  ENTRA_ID_TENANT_ID: {{ .Values.secrets.entraIdTenantId | quote }}
