apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "inova-monitoring.fullname" . }}
  labels:
    {{- include "inova-monitoring.labels" . | nindent 4 }}
data:
  POSTGRES_HOST: {{ .Values.config.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.config.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.config.postgres.db | quote }}
  POSTGRES_USER: {{ .Values.config.postgres.user | quote }}
  PROMETHEUS_URL: {{ .Values.config.prometheus.url | quote }}
  PROMETHEUS_ENDPOINTS: {{ .Values.config.prometheus.endpoints | quote }}
  AUTH_METHODS_ALLOWED: {{ .Values.config.auth.methodsAllowed | quote }}
  ENABLE_BASIC_AUTH: {{ .Values.config.auth.enableBasicAuth | quote }}
  DEBUG: {{ .Values.config.app.debug | quote }}
