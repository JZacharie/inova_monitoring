<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <meta name="description" content="Inova Apps Monitoring Dashboard - PostgreSQL query interface with real-time WebSocket communication">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Inova Apps Monitoring</h1>
        <p class="subtitle">Real-time PostgreSQL Query Interface</p>
        <div id="ws-status" class="ws-badge ws-connecting">
            <span class="ws-dot"></span>
            <span id="ws-status-text">Connecting…</span>
        </div>
    </header>

    <div class="container">
        <div id="error-message"></div>

        <div class="controls">
            <input type="text" id="query-input" placeholder="Enter SQL query…" value="SELECT current_database() AS db, current_user AS user, version() AS version;">
            <button id="run-query" disabled>Execute Query</button>
        </div>

        <div id="loader" class="loader"></div>

        <div class="table-wrapper">
            <table id="data-table">
                <thead id="table-head"></thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="100%" class="empty-state">Waiting for connection…</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="row-count" class="row-count"></div>
    </div>

    <script>
        const queryInput  = document.getElementById('query-input');
        const runButton   = document.getElementById('run-query');
        const tableHead   = document.getElementById('table-head');
        const tableBody   = document.getElementById('table-body');
        const loader      = document.getElementById('loader');
        const errorMsg    = document.getElementById('error-message');
        const wsBadge     = document.getElementById('ws-status');
        const wsText      = document.getElementById('ws-status-text');
        const rowCount    = document.getElementById('row-count');

        let socket = null;

        // ── WebSocket lifecycle ──────────────────────────────────────────
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            socket = new WebSocket(`${proto}://${location.host}/ws`);

            socket.onopen = () => {
                setStatus('connected');
            };

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                dispatch(msg);
            };

            socket.onclose = () => {
                setStatus('reconnecting');
                runButton.disabled = true;
                setTimeout(connect, 3000);   // auto-reconnect
            };

            socket.onerror = () => {
                socket.close();
            };
        }

        // ── Message dispatcher (hexagonal protocol) ──────────────────────
        function dispatch(msg) {
            switch (msg.type) {
                case 'welcome':
                    setStatus('connected');
                    runButton.disabled = false;
                    tableBody.innerHTML = `<tr><td colspan="100%" class="empty-state">${msg.payload.message} · v${msg.payload.version}</td></tr>`;
                    break;

                case 'query_result':
                    renderResult(msg.payload);
                    break;

                case 'query_error':
                    showError(msg.payload.detail);
                    break;

                default:
                    console.warn('Unknown message type:', msg.type);
            }
        }

        // ── Send a query_request envelope ────────────────────────────────
        function sendQuery() {
            const sql = queryInput.value.trim();
            if (!sql || !socket || socket.readyState !== WebSocket.OPEN) return;

            errorMsg.style.display = 'none';
            rowCount.textContent = '';
            loader.style.display = 'block';
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            runButton.disabled = true;

            socket.send(JSON.stringify({
                type:    'query_request',
                payload: { sql }
            }));
        }

        // ── Render helpers ────────────────────────────────────────────────
        function renderResult({ columns, rows, row_count }) {
            loader.style.display = 'none';
            runButton.disabled = false;

            if (!columns.length) {
                tableBody.innerHTML = `<tr><td colspan="100%" class="empty-state">Query returned no results.</td></tr>`;
                return;
            }

            // Header
            const headRow = document.createElement('tr');
            columns.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col;
                headRow.appendChild(th);
            });
            tableHead.appendChild(headRow);

            // Rows — animate each row in with a stagger
            rows.forEach((row, i) => {
                const tr = document.createElement('tr');
                tr.style.animationDelay = `${i * 30}ms`;
                tr.classList.add('fade-in');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = row[col] ?? 'NULL';
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });

            rowCount.textContent = `${row_count} row${row_count === 1 ? '' : 's'} returned`;
        }

        function showError(detail) {
            loader.style.display = 'none';
            runButton.disabled = false;
            errorMsg.textContent = '⚠ ' + detail;
            errorMsg.style.display = 'block';
            tableBody.innerHTML = `<tr><td colspan="100%" class="empty-state error-state">Query failed.</td></tr>`;
        }

        function setStatus(state) {
            wsBadge.className = `ws-badge ws-${state}`;
            wsText.textContent = { connected: 'Connected', connecting: 'Connecting…', reconnecting: 'Reconnecting…' }[state] ?? state;
        }

        // ── Event bindings ────────────────────────────────────────────────
        runButton.addEventListener('click', sendQuery);
        queryInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendQuery(); });

        // Boot
        connect();
    </script>
</body>
</html>
