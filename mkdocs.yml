site_name: Inova Monitoring
site_description: Real-time monitoring platform for Inova Apps instances
site_author: JZacharie
site_url: https://jzacharie.github.io/inova_monitoring/
repo_url: https://github.com/JZacharie/inova_monitoring
repo_name: JZacharie/inova_monitoring

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - WebSocket Protocol: websocket.md
